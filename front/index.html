<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Acortador de URLs</title>
        <link href="index.css" rel="stylesheet"/>
    </head>
    <body>
        <div id="header" class="Header smoothColor"></div>

        <div class="URLChangerBox" id="demo">
            <h1 class="title smoothColor">Acortador de URLs</h1>
            <div>
                <h2 class="subtitle">Ingrese su URL larga</h2>
                <form name="url">
                    <textarea id="longURLInput" rows="1" placeholder="http://ejemplolargo.com"></textarea>
                </form>
            </div>
            <div class="BTNalign">
                <button class="AcortBTN smoothColor" id="acortBTN">Acortar URL</button>
            </div>
        </div>
        <div id="changes""></div>

        <script src="script.js"></script>
        
    </body>
</html>
